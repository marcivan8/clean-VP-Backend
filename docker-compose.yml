version: '3.8'

services:
  backend:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # IMPORTANT: Add your Supabase and OpenAI keys in your deployment environment
      # - SUPABASE_URL=...
      # - SUPABASE_SERVICE_KEY=...
      # - OPENAI_API_KEY=...
    volumes:
      - uploads_data:/usr/src/app/uploads

volumes:
  uploads_data:
