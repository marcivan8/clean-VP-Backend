<!-- @dsCard group="Type" viewport="700x260" name="Body — Geist" subtitle="Geometric sans, ss01/ss02/cv11 features for UI & copy" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body { margin:0; background:var(--ink-950); }
  .wrap { padding:26px 32px; font-family:var(--f-sans); font-feature-settings:var(--f-sans-features); }
  .meta { font-family:var(--f-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-faint); margin-bottom:16px; }
  .line { display:flex; align-items:baseline; gap:14px; margin-bottom:10px; }
  .w { font-family:var(--f-mono); font-size:11px; color:var(--text-faint); width:64px; }
  .s { color:var(--text-strong); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="meta">--f-sans · Geist</div>
    <div class="line"><span class="w">600 · 26</span><span class="s" style="font-size:26px; font-weight:600; letter-spacing:-.01em;">Generate a rough cut from a prompt</span></div>
    <div class="line"><span class="w">500 · 18</span><span class="s" style="font-size:18px; font-weight:500;">Trim, caption and color in one pass</span></div>
    <div class="line"><span class="w">400 · 16</span><span style="font-size:16px; color:var(--text-body);">Vibed turns plain-language direction into precise edits — describe the change and watch the timeline update in real time.</span></div>
  </div>
</body>
</html>
