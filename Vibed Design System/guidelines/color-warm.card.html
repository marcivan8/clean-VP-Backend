<!-- @dsCard group="Colors" viewport="700x180" name="Warm Theme" subtitle="Cream alternative · .theme-warm scope" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body { margin:0; }
  .wrap { padding:24px 32px; display:flex; gap:14px; flex-wrap:wrap; align-items:center; background:#F4F1EC; }
  .sw { width:120px; height:96px; border-radius:10px; border:1px solid rgba(22,24,27,.12);
        display:flex; flex-direction:column; justify-content:flex-end; padding:10px; }
  .n { font-family:var(--f-mono); font-size:10px; text-transform:uppercase; }
  .h { font-family:var(--f-mono); font-size:10px; opacity:.55; }
  .note { font-family:var(--f-display); font-size:26px; color:#16181B; }
</style>
</head>
<body>
  <div class="wrap theme-warm">
    <div class="sw" style="background:#F4F1EC;"><span class="n" style="color:#16181B;">cream 100</span><span class="h" style="color:#16181B;">#F4F1EC</span></div>
    <div class="sw" style="background:#ECE7DF;"><span class="n" style="color:#16181B;">cream 200</span><span class="h" style="color:#16181B;">#ECE7DF</span></div>
    <div class="sw" style="background:#16181B;"><span class="n" style="color:#F4F1EC;">charcoal</span><span class="h" style="color:#F4F1EC;">#16181B</span></div>
    <div class="note">Warm <em style="font-style:italic;">cut</em>.</div>
  </div>
</body>
</html>
