<!-- @dsCard group="Type" viewport="700x220" name="Mono — JetBrains Mono" subtitle="Tracked-out uppercase eyebrows, tags, studio UI" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body { margin:0; background:var(--ink-950); }
  .wrap { padding:26px 32px; }
  .meta { font-family:var(--f-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-faint); margin-bottom:18px; }
  .eb { font-family:var(--f-mono); text-transform:uppercase; }
  .tags { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
  .tag { font-family:var(--f-mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--text-body);
         border:1px solid var(--border-hairline); border-radius:6px; padding:5px 10px; background:var(--surface-card-strong); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="meta">--f-mono · JetBrains Mono</div>
    <div class="eb" style="font-size:12px; letter-spacing:.18em; color:var(--accent);">● Studio · Eyebrow Label</div>
    <div class="tags">
      <span class="tag">4K · ProRes</span>
      <span class="tag">00:42:18</span>
      <span class="tag">Cut</span>
      <span class="tag">Caption</span>
      <span class="tag">Color</span>
    </div>
  </div>
</body>
</html>
