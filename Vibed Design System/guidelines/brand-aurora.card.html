<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="../styles.css">

  html,body { margin:0; background:var(--ink-950); }

  .lbl { position:relative; z-index:2; font-family:var(--f-mono); font-size:12px; letter-spacing:.16em;

</style>
</head>
<body>
  <div class="stage">
    <div class="aurora"></div>
    <div class="film-grain" style="position:absolute;"></div>
    <span class="lbl">filter: blur(120px) · cyan + violet</span>
  </div>
</body>
</html>
