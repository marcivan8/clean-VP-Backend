<!-- @dsCard group="Colors" viewport="700x170" name="Dark Studio Neutrals" subtitle="Pitch grounds + off-white text ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body { margin:0; background:var(--ink-950); }
  .wrap { padding:24px 32px; display:flex; gap:12px; flex-wrap:wrap; }
  .sw { width:96px; height:96px; border-radius:10px; border:1px solid var(--border-hairline);
        display:flex; flex-direction:column; justify-content:flex-end; padding:9px; }
  .n { font-family:var(--f-mono); font-size:10px; color:var(--text-body); text-transform:uppercase; }
  .h { font-family:var(--f-mono); font-size:10px; color:var(--text-faint); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw" style="background:#0A0A0B;"><span class="n">ink 950</span><span class="h">#0A0A0B</span></div>
    <div class="sw" style="background:#121214;"><span class="n">ink 900</span><span class="h">#121214</span></div>
    <div class="sw" style="background:#1F1F23;"><span class="n">ink 800</span><span class="h">#1F1F23</span></div>
    <div class="sw" style="background:#2A2A30;"><span class="n">ink 700</span><span class="h">#2A2A30</span></div>
    <div class="sw" style="background:#FAFAFA;"><span class="n" style="color:#16181B;">paper 50</span><span class="h" style="color:rgba(22,24,27,.6);">#FAFAFA</span></div>
  </div>
</body>
</html>
