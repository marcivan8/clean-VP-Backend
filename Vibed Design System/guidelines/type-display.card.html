<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body { margin:0; background:var(--ink-950); }
  .wrap { padding:28px 32px; }
  .row { display:flex; align-items:baseline; gap:16px; color:var(--text-strong); }
  .big { font-family:var(--f-display); letter-spacing:var(--ls-display); line-height:1.02; }
  .meta { font-family:var(--f-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-faint); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="meta" style="margin-bottom:14px;">--f-display · Instrument Serif</div>
    <div class="big" style="font-size:62px; color:var(--text-strong); margin-bottom:8px;">Edit by <em style="font-style:italic;">talking</em>.</div>
    <div class="big" style="font-size:34px; color:var(--text-muted);">Cinematic, <em style="font-style:italic;">conversational</em> video.</div>
  </div>
</body>
</html>
