<!-- @dsCard group="Type" viewport="700x150" name="Type Scale" subtitle="Display → eyebrow ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body { margin:0; background:var(--ink-950); }
  .wrap { padding:22px 32px; display:flex; align-items:baseline; gap:22px; flex-wrap:wrap; color:var(--text-strong); }
  .item { display:flex; flex-direction:column; gap:4px; }
  .lbl { font-family:var(--f-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-faint); }
  .g { font-family:var(--f-display); line-height:1; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><span class="g" style="font-size:64px;">Aa</span><span class="lbl">96 / 72 display</span></div>
    <div class="item"><span class="g" style="font-size:40px;">Aa</span><span class="lbl">40 section</span></div>
    <div class="item"><span style="font-family:var(--f-sans); font-size:26px; font-weight:600;">Aa</span><span class="lbl">26 h2</span></div>
    <div class="item"><span style="font-family:var(--f-sans); font-size:16px;">Aa</span><span class="lbl">16 body</span></div>
    <div class="item"><span style="font-family:var(--f-mono); font-size:12px; letter-spacing:.14em;">AA</span><span class="lbl">12 eyebrow</span></div>
  </div>
</body>
</html>
