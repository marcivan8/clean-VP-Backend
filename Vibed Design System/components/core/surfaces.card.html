<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body { margin:0; background:var(--ink-950); }
  #stage { position:relative; min-height:270px; padding:26px 32px; overflow:hidden; }
</style>

<body>
  <div id="stage"><div class="aurora"></div><div id="root" style="position:relative;z-index:2;"></div></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Card, Tabs, Avatar, Badge, Icon } = window.VibedDesignSystem_013733;
    function Demo() {
      const [tab, setTab] = React.useState("edit");
      return (
        <div style={{ display:"flex", gap:20, alignItems:"flex-start", flexWrap:"wrap" }}>
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <Tabs value={tab} onChange={setTab} tabs={[
              {id:"edit", label:"Edit", icon:<Icon name="scissors" size={13} />},
              {id:"color", label:"Color", icon:<Icon name="palette" size={13} />},
              {id:"audio", label:"Audio", icon:<Icon name="volume-2" size={13} />},
            ]} />
            <div style={{ display:"flex", gap:10, alignItems:"center" }}>
              <Avatar name="Ana Ruiz" status="online" />
              <Avatar name="Theo Vance" status="render" />
              <Avatar name="MK" status="rec" size={32} />
            </div>
          </div>
          <Card interactive glow style={{ width:280 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <Badge tone="cyan">Ready</Badge>
              <span style={{ fontFamily:"var(--f-mono)", fontSize:11, color:"var(--text-faint)" }}>01:48</span>
            </div>
            <div style={{ fontFamily:"var(--f-display)", fontSize:26, color:"var(--text-strong)", lineHeight:1.05 }}>
              Opening <em style={{fontStyle:"italic"}}>sequence</em>
            </div>
            <div style={{ fontSize:13, color:"var(--text-muted)", marginTop:6 }}>4K · ProRes · 12 edits applied</div>
          </Card>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
