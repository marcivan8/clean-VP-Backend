app = "vibed-render-worker"
primary_region = "cdg"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
  
  [http_service.concurrency]
    type = "connections"
    hard_limit = 3
    soft_limit = 2

[[vm]]
  size = "shared-cpu-2x"
  memory = "4096"
  cpus = 2
